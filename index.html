<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background:#121212; color:#fff; text-align:center; font-family:sans-serif; padding: 20px; }
        button { padding:15px 20px; margin: 10px; font-size: 18px; background: #00d1ff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        input { padding: 15px; font-size: 16px; margin: 10px; width: 80%; max-width: 400px; text-align: center; border-radius: 5px; border: none; }
        video { width: 100%; max-width: 800px; margin-top: 20px; border: 2px solid #333; background: #000; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="setup">
        <h1>Select Device</h1>
        <button onclick="showMobile()">I AM MOBILE</button>
        <button onclick="showTV()">I AM TV</button>
    </div>

    <div id="mobile" class="hidden">
        <h2>Paste TeraBox Link</h2>
        <input type="text" id="video-url" placeholder="https://terabox...">
        <br>
        <button onclick="sendLink()">CAST LINK</button>
        <h1 id="outCode" style="color: #00ff88; font-size: 40px;"></h1>
    </div>

    <div id="tv" class="hidden">
        <h2>Enter TV Code</h2>
        <input type="text" id="inCode" placeholder="4-Digit Code">
        <br>
        <button onclick="playVideo()">WATCH MOVIE</button>
        <video id="v" controls></video>
        <p id="tv-status" style="color: #ff4444;"></p>
    </div>

    <script>
        function showMobile() { document.getElementById('setup').classList.add('hidden'); document.getElementById('mobile').classList.remove('hidden'); }
        function showTV() { document.getElementById('setup').classList.add('hidden'); document.getElementById('tv').classList.remove('hidden'); }

        async function sendLink() {
            const url = document.getElementById('video-url').value.trim();
            if (!url) return alert("Please paste a link first!");

            document.getElementById('outCode').innerText = "Generating code...";

            const response = await fetch('/send-link', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: url })
            });
            
            const data = await response.json();
            document.getElementById('outCode').innerText = "TV CODE: " + data.code;
        }

        async function playVideo() {
            const code = document.getElementById('inCode').value.trim();
            const status = document.getElementById('tv-status');
            status.innerText = "";

            if (!code) return alert("Enter the code!");

            const response = await fetch('/get-link/' + code);
            
            if (response.ok) {
                const data = await response.json();
                const videoElement = document.getElementById('v');
                videoElement.src = data.url;
                videoElement.play();
            } else {
                status.innerText = "Invalid code or link expired.";
            }
        }
    </script>
</body>
</html>
